description: |
  A Waymo robotaxi struck a 9-year-old child near an elementary school during
  the morning drop-off period. The child sustained minor injuries. The incident
  occurred in a school zone with heavy pedestrian activity including children,
  parents, and crossing guards. The school zone environment presents elevated
  risk due to the unpredictable movement patterns of young children. The incident
  reignited debate about robotaxi operations near schools and in areas with
  high concentrations of vulnerable road users.
description_cn: |
  一辆 Waymo Robotaxi 在早间送学时段撞击了一名小学附近的 9 岁儿童。儿童受轻伤。
  事发地点为学校区域，行人密集，包括儿童、家长和过街引导员。学校区域因低龄儿童运动
  模式不可预测而存在更高风险。该事件重新引发了关于 Robotaxi 在学校附近及弱势道路使用者
  密集区域运营的讨论。
