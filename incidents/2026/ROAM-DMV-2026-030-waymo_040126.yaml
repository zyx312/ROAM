description: |
  On April 1, 2026 at 12:20 PM PT a Waymo Autonomous Vehicle (“Waymo AV”) operating in Venice, California was in a collision
  involving a pickup truck on Electric Avenue near Milwood Avenue.
  
  The Waymo AV was stopped facing west on a narrow portion of Electric Avenue, with vehicles parked at the curb in both directions, to
  yield to a pickup truck traveling eastbound on Electric Avenue. While the Waymo AV was stopped, the pickup truck proceeded to pass the
  Waymo AV to the left, and the left side of the pickup truck made contact with the rear left side of the stationary Waymo AV. At the time of
  the impact, the Waymo AV’s Level 4 ADS was engaged in autonomous mode. The Waymo AV sustained damage.
