description: |
  On March 15, 2026 at 5:10 PM PT a Waymo Autonomous Vehicle (“Waymo AV”) operating in Los Angeles, California was in a collision
  involving an SUV on W. 23rd Street near S. Hill Street.
  
  The Waymo AV was traveling northwestbound on a narrow portion of W. 23rd Street, with vehicles parked at the south curb and double
  parked in the northwestbound lane, when it slowed to a stop in the opposing lane of traffic with its hazard lights activated to yield to an
  SUV traveling southeastbound on W. 23rd Street. The SUV stopped in-lane and the Waymo AV proceeded forward momentarily before
  coming to a stop between the stopped SUV and a double parked passenger car facing northwest. While the Waymo AV was stopped, the
  SUV began to pass the Waymo AV to the left and the left side of the SUV made contact with the left side of the stationary Waymo AV. At
  the time of the impact, the Waymo AV’s Level 4 ADS was engaged in autonomous mode. The SUV sustained damage.
