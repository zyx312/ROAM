description: |
  On April 3, 2026, Nuro was operating a Prius test vehicle in auto mode on Martin Avenue, a street in Santa Clara, CA with a single travel
  lane in the direction of travel, when a motorcycle attempted to overtake the Nuro vehicle from behind. In so doing, the motorcyclist clipped
  the side of the Nuro vehicle, causing some minor property damage to the Nuro vehicle. The motorcyclist then pulled over to the side of the
  road, and both parties exchanged information. Neither the motorcyclist nor the occupants of the Nuro vehicle were injured, and law
  enforcement was not called to the scene.
