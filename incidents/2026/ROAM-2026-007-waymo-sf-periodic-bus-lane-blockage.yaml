id: "ROAM-2026-007"
date: "2026-01-01"
operator: "Waymo"
location:
  city: "San Francisco, USA"
  road_type: "urban bus lanes and intersections"
  specific: "Various bus lanes and intersections across San Francisco, recurring"
scenario:
  primary: "C1"
  secondary: ["E3"]
severity: "S1"
urgency: "U3"
description: |
  Recurring incidents of Waymo robotaxis stalling in bus lanes and intersections
  across San Francisco throughout 2026. These are not single events but a persistent
  pattern where vehicles enter a frozen or confused state, blocking dedicated bus
  lanes and intersection approaches. Average resolution time is approximately
  20 minutes per incident. SFMTA has documented multiple instances where stalled
  robotaxis delayed Muni bus service. The cumulative impact on public transit
  reliability is significant, affecting thousands of daily bus riders.
  The recurring nature of the problem suggests a systemic issue with the
  vehicle's handling of bus lane geometry, signaling, or right-of-way rules
  rather than random failures.
description_cn: |
  2026 年间，Waymo Robotaxi 在旧金山各处公交车道和交叉路口反复出现停摆事件。这并非
  单一事件，而是一种持续性模式：车辆进入冻结或混乱状态，阻塞专用公交车道和交叉路口
  进口。平均每次事件解决时间约 20 分钟。SFMTA 记录了多起停摆 Robotaxi 导致 Muni
  公交延误的案例。对公共交通可靠性的累积影响显著，影响到每日数千名公交乘客。问题的
  反复性表明车辆在处理公交车道几何、信号或路权规则方面存在系统性缺陷，而非随机故障。
