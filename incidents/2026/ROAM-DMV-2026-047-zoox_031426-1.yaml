description: |
  A Zoox vehicle (Vehicle 1) operating in autonomous mode was stopped behind traffic in the through lane on westbound Haight Street at a
  red traffic light at Octavia Boulevard in San Francisco with a passenger car (Vehicle 2), stopped directly ahead. After both vehicles were
  fully stopped, Vehicle 2 began moving backward toward the still-stopped Zoox vehicle, and even though the Zoox vehicle honked its horn,
  Vehicle 2 continued to move backward and made contact with the Zoox vehicle's front bumper. The Zoox vehicle operator then disengaged
  from autonomy. The Zoox vehicle sustained minor damage. No injuries were reported, and police were not notified.
