description: |
  On March 30, 2026 at 12:06 PM PT a Waymo Autonomous Vehicle (“Waymo AV”) operating in Los Angeles, California was in a collision
  involving an SUV on Carlos Avenue near N. Gower Street.
  
  The Waymo AV was traveling westbound on Carlos Avenue. An SUV traveling northbound in a parking lot on the south side of Carlos
  Avenue exited the parking lot without stopping, began turning left onto Carlos Avenue, and entered the Waymo AV’s lane of travel, and the
  front right side of the SUV made contact with the rear left side of the Waymo AV. At the time of the impact, the Waymo AV’s Level 4
  ADS was engaged in autonomous mode, and a test driver was present (in the driver’s seating position). The Waymo AV sustained damage.
