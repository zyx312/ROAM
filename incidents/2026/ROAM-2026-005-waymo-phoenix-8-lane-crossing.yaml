  primary: "C3"
  secondary: ["B1", "C1"]
severity: "S2"
urgency: "U2"
description: |
  A Waymo robotaxi attempted to cross an 8-lane road without an adequate gap in
  oncoming traffic. The vehicle committed to the crossing maneuver but stopped
  in the middle of the road, blocking multiple lanes of oncoming traffic.
  Passengers inside the vehicle were screaming in distress as vehicles approached
  at speed. The robotaxi remained frozen in the exposed position for an extended
  period before eventually completing the crossing. The incident was captured on
  video by passengers and went viral, illustrating the terror experienced when
  an ADS makes a dangerous decision that passengers cannot override.
description_cn: |
  一辆 Waymo Robotaxi 在对向车流间隙不足的情况下尝试横穿 8 车道道路。车辆已启动穿越
  操作但在道路中央停下，阻塞多条对向车道。车内乘客在高速来车逼近时惊恐尖叫。Robotaxi
  在暴露位置冻结了较长时间后才最终完成穿越。乘客拍摄的视频广泛传播，生动展现了当 ADS
  做出危险决策而乘客无法干预时所经历的恐惧。
