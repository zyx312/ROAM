description: |
  An occupied Zoox vehicle, after turning right onto Howard Street from 7th Street in San Francisco, pulled over to the right to drop off a
  passenger. Shortly after the passenger exited and while the now-unoccupied Zoox vehicle was attempting to re-enter the travel lane in heavy
  traffic, a van (Vehicle 2) lightly swiped the left rear fender while attempting to pass the Zoox vehicle on the left. Vehicle 2's operator did not
   stop to exchange information. The Zoox vehicle was found to have sustained minor damage. No injuries were reported, and police were not
  notified.
