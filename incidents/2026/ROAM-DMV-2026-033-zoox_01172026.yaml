description: |
  An occupied Zoox autonomous vehicle began to proceed on a fresh green traffic signal on westbound 15th Street at Mission Street when the
  driver of a stationary passenger vehicle (Vehicle 2), parallel-parked in the curb lane, rapidly opened the driver door into the path of the
  approaching Zoox vehicle. The Zoox vehicle braked hard and attempted to steer left, but contact was unavoidable. The right side front
  fender, wheels, bodyside, and door panels made contact with the outside edge of the opening door of Vehicle 2. The Zoox vehicle came to
  an immediate stop and was later towed from the scene to be inspected for damage. First responders arrived at the scene. The passenger of
  the Zoox vehicle did not report any injuries. Later media stories reported the driver of Vehicle 2 had a “smashed hand” and his “hand was
  hurting, and that he was also experiencing pain to his neck area and lower back” based on a third party’s account, and that the driver
  “declined their offer to take him to the hospital.”
  Zoox vehicle camera footage shows clearly that no part of the robotaxi came into contact with the driver themselves, and that their hands,
  leg, and body did not interact with either the robotaxi or the parked vehicle’s door at any moment during the contact event.
