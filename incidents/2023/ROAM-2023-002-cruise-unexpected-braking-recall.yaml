severity: "S2"
urgency: "U2"
description: |
  Cruise issued a voluntary recall of 1,194 vehicles due to a software defect causing
  unexpected hard braking events. The vehicles would brake suddenly and without apparent
  cause, leading to rear-end collisions by following vehicles. Multiple incidents were
  reported where the unexpected braking caused injuries to occupants of following vehicles.
  The recall addressed the prediction software that was incorrectly assessing the behavior
  of oncoming vehicles in certain scenarios.
description_cn: |
  Cruise 因软件缺陷导致意外急刹车事件，主动召回 1,194 辆车。车辆会突然无明显原因地制动，导致后方车辆
  追尾碰撞。多起事件中，意外制动造成后方车辆乘员受伤。此次召回针对的是在特定场景下错误评估对向车辆
  行为的预测软件。
