description: |
  A Cruise autonomous vehicle ran over and dragged a pedestrian approximately 20 feet
  (6 meters) after she was initially struck by a separate human-driven vehicle and thrown
  into the path of the robotaxi. The Cruise vehicle initially stopped after impact but
  then executed a pullover maneuver, dragging the trapped pedestrian. The pedestrian
  suffered severe, life-altering injuries. Cruise initially failed to disclose the
  dragging portion of the incident to regulators, providing only a truncated video.
  This incident triggered the most significant regulatory backlash in the L4 industry
  to date.
description_cn: |
  一辆 Cruise 自动驾驶车辆碾压并拖拽一名行人约 20 英尺（6 米）。该行人此前被另一辆人类驾驶车辆撞击后
  弹入 Robotaxi 行驶路径。Cruise 车辆在初次碰撞后停车，但随后执行了靠边停车操作，拖拽了被困在车底的
  行人。行人遭受了严重的、改变人生的伤害。Cruise 最初未向监管机构披露拖拽部分的事实，仅提供了经剪辑的
  视频。该事件引发了 L4 行业迄今为止最严重的监管反弹。
