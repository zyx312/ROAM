description: |
  On November 12, 2021 at 1:23 PM PST a Waymo Autonomous Vehicle (“Waymo AV”) operating in San Francisco, CA was in a collision
  involving a passenger vehicle at Divisadero Street at Turk Street.
  
  The Waymo AV was stopped at a red light on Divisadero Street at Turk Street. When the traffic light turned green, the passenger vehicle
  behind the Waymo AV made contact with the rear of the Waymo AV. At the time of the impact, the Waymo AV’s Level 4 ADS was
  engaged in autonomous mode, and a test driver was present (in the driver’s seating position). The Waymo AV sustained minor damage, and
  the trailing passenger vehicle sustained minor damage.
