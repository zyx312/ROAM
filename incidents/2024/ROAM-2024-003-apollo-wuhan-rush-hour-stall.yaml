id: "ROAM-2024-003"
date: "2024-07-10"
operator: "Baidu Apollo (萝卜快跑)"
location:
  city: "Wuhan, China"
  road_type: "urban road"
  specific: "Wuhan urban area, during evening rush hour"
scenario:
  primary: "C1"
  secondary: ["B1"]
severity: "S1"
urgency: "U3"
description: |
  A 萝卜快跑 (Luobo Kuaipao) robotaxi stalled during evening rush hour traffic
  in Wuhan, blocking traffic flow. The vehicle stopped mid-road and was unable to
  resume autonomous driving. The incident occurred during the peak of public scrutiny
  following the pedestrian contact incident days earlier. Traffic congestion resulted
  as other vehicles had to navigate around the stalled robotaxi. The incident
  highlighted concerns about robotaxi fleet resilience during high-traffic periods.
description_cn: |
  一辆萝卜快跑 Robotaxi 在武汉晚高峰期间抛锚，阻塞交通。车辆在道路中间停车，无法恢复自动驾驶。
  该事件发生在行人接触事件数日后公众审视最为密集的时期。其他车辆被迫绕行，导致交通拥堵。
  该事件突显了 Robotaxi 车队在高流量时段的韧性问题。
