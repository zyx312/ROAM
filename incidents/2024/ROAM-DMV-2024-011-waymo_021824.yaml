description: |
  On February 18, 2024 at 1:03 AM PT a Waymo Autonomous Vehicle ("Waymo AV") operating in San Francisco, California was in a
  collision involving a passenger car on The Embarcadero at Washington Street.
  
  The Waymo AV was stopped in traffic for a red light on The Embarcadero southbound when a passenger car approached from behind and
  made contact with the rear of the Waymo AV. At the time of the impact, the Waymo AV's Level 4 ADS was engaged in autonomous mode,
  and a test driver was present (in the driver's seating position). Both vehicles sustained damage and the passenger car left the scene.
