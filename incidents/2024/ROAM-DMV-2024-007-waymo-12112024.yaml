description: |
  On December 11, 2024 at 12:56 AM PT a Waymo Autonomous Vehicle ("Waymo AV") operating in San Francisco, California was in a
  collision involving a vacuum cleaner on Bayshore Boulevard at Silver Avenue.
  
  The Waymo AV was traveling north on Bayshore Boulevard in the left lane of two lanes when it encountered a vacuum cleaner laying on its
  side in the roadway within its lane and across the lane line separating the two lanes. The Waymo AV applied braking and the front
  passenger side tire of the Waymo AV made contact with the vacuum cleaner. At the time of the impact, the Waymo AV's Level 4 ADS was
  engaged in autonomous mode. The vacuum cleaner sustained damage.
  
  Waymo is reporting this crash under Request No. 2 of Standing General Order 2021-01. Waymo may supplement or correct its reporting
  with additional information as it may become available.
