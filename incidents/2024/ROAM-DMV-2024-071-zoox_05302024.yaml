description: |
  A Zoox vehicle (Vehicle 1) in autonomy was traveling westbound on Chess Drive in Foster City when a parallel-parked passenger car
  (Vehicle 2) abruptly entered the Zoox vehicle’s travel lane from a parking space in the right parking lane without yielding or activating a
  turn signal. Vehicle 2 made contact with the right front side and wheel of the Zoox vehicle, and the Zoox vehicle made contact with the
  driver's side door and left front tire/wheel well of the passenger car. Both vehicles sustained moderate damage and the Zoox vehicle was
  towed from the scene. There were no reported injuries at that time and police were not called. Zoox is submitting this updated report to
  include new information on an unspecified "soft tissue injury" claim received on December 3, 2024, from one of the passengers in Vehicle 2.
   This update provides complete information to date for this incident.
