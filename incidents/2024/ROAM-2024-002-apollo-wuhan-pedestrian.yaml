id: "ROAM-2024-002"
date: "2024-07-07"
operator: "Baidu Apollo (萝卜快跑)"
location:
  city: "Wuhan, China"
  road_type: "urban intersection"
  specific: "Wuhan urban area"
scenario:
  primary: "C5"
  secondary: ["B4"]
severity: "S1"
urgency: "U3"
description: |
  A Baidu Apollo robotaxi (萝卜快跑/Luobo Kuaipao) collided with a jaywalking
  pedestrian at an intersection while the vehicle had a green light. The incident
  was described as "light contact" (轻微接触) by Baidu. The pedestrian crossed
  against the signal. The incident drew significant public attention in China as
  萝卜快跑 was rapidly scaling operations in Wuhan, becoming the world's largest
  robotaxi fleet deployment. Public debate intensified around the displacement of
  traditional taxi drivers and safety of autonomous vehicles in Chinese cities.
description_cn: |
  一辆百度 Apollo Robotaxi（萝卜快跑）在路口与一名闯红灯的行人发生碰撞，当时车辆处于绿灯通行状态。
  百度将该事件描述为"轻微接触"。行人违反信号灯过马路。该事件在中国引发广泛关注，彼时萝卜快跑正在
  武汉快速扩大运营规模，成为全球最大的 Robotaxi 车队部署。围绕传统出租车司机就业替代和自动驾驶
  车辆在中国城市安全性的公共讨论显著升温。
