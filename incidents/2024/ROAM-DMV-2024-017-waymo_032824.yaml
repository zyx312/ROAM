description: |
  On March 28, 2024 at 7:30 AM PT a Waymo Autonomous Vehicle (“Waymo AV”) operating in Los Angeles, California was in a collision
  involving a passenger car on Louisiana Avenue at Kerwood Avenue.
  
  While making a tight left turn from southbound Kerwood Avenue onto northeastbound Louisiana Avenue, the Waymo AV made contact
  with the driver side of a parked passenger car. At the time of the impact, the Waymo AV’s Level 4 ADS was engaged in autonomous mode,
  and a test driver was present (in the driver’s seating position). Both vehicles sustained damage.
