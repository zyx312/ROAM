description: |
  A Cruise autonomous vehicle (“Cruise AV”), operating in autonomous mode, was traveling westbound on Division Street between Potrero
  Avenue and Bryant Street when the Cruise AV slowed down in the right turn lane. The driver of the Cruise AV disengaged from
  autonomous mode, and shortly thereafter, an electric scooterist traveling in the same lane made contact with the rear bumper and fascia of
  the Cruise AV. The scooterist reported injuries and emergency services and the police arrived at the scene. SFPD incident report number
  190633860 was not available at the time of filing of this report.
