description: |
  On March 12, 2019 at approximately 4:07 pm, a Lyft Autonomous Vehicle ("Lyft AV"), operating at full manual mode, made contact at
  approximately 2 mph with a parked 3rd party vehicle while reversing during a multi-point turn. There was no driver or passenger present in
  the 3rd party vehicle. The incident occurred on Pettis Avenue near El Camino Boulevard in Mountain View, CA. Minor damage is limited
  to the left rear bumper area of the Lyft AV (A010) and the left rear driver's side of the 3rd party, pending further inspection. The owner of
  the 3rd party vehicle came outside to exchange information with the operators. No injuries were reported and the police were not notified.
