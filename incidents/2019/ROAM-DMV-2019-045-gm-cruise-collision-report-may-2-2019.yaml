description: |
  A Cruise autonomous vehicle (“Cruise AV”), operating in autonomous mode, was stopped at a red light on eastbound 24th Street at the
  intersection with Potrero Avenue when another vehicle approaching from the rear did not come to a complete stop and made contact with
  the Cruise AV’s rear bumper. The driver of the other vehicle drove away without exchanging information. The Cruise AV tester sitting in
  the driver’s seat requested medical treatment and emergency services arrived on the scene. SFPD incident report number was not available
  at the time of filing of this report.
