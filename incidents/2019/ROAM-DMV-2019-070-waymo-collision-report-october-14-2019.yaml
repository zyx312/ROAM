description: |
  A Waymo Autonomous Vehicle (“Waymo AV”) was stopped in autonomous mode on westbound Cuesta Drive at S. San Antonio Road in
  Los Altos when it was rear-ended. The Waymo AV was preparing to make a right-on-red from Cuesta Drive onto northbound S. San
  Antonio Road and was yielding to cross-traffic when a passenger vehicle made contact with the Waymo AV's rear bumper at approximately
  3 MPH. The Waymo AV sustained minor damage to its rear bumper, and the passenger vehicle sustained no damage to its front bumper. No
  injuries were reported.
