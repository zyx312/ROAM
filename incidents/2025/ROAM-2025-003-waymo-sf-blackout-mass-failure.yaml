regulatory_action: |
  SFMTA and CPUC launched reviews of robotaxi resilience requirements.
  San Francisco officials publicly criticized Waymo's emergency response capacity.
  Renewed calls for mandatory fleet resilience standards.
regulatory_action_cn: |
