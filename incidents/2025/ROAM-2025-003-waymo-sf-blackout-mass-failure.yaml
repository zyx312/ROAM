description: |
  A widespread PG&E power outage in San Francisco caused mass paralysis of the
  Waymo robotaxi fleet. Over 20 vehicles became immobilized across the city,
  blocking traffic lanes and intersections. The outage disabled traffic signals
  and connectivity infrastructure that the vehicles depended on. Emergency services
  were severely impacted — first responders called Waymo's support hotline 31 times,
  spending a cumulative 2 hours and 36 minutes on hold waiting for assistance.
  The incident exposed critical dependencies on external infrastructure and
  revealed that Waymo's emergency response systems were wholly inadequate for
  a multi-vehicle simultaneous failure scenario. This was the first documented
  mass fleet failure event for a commercial robotaxi service.
description_cn: |
  旧金山大面积 PG&E 停电导致 Waymo Robotaxi 车队大规模瘫痪。超过 20 辆车在全市各处
  失去行动能力，阻塞车道和交叉路口。停电使车辆所依赖的交通信号灯和通信基础设施失效。
  应急服务受到严重影响——急救人员共拨打 Waymo 支持热线 31 次，累计等待时间达 2 小时
  36 分钟。该事件暴露了对外部基础设施的关键依赖，并表明 Waymo 的应急响应系统完全无法
  应对多车同时故障的场景。这是商业 Robotaxi 服务中首次有记录的大规模车队故障事件。
