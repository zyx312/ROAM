description: |
  On August 21, 2025 at 12:59 AM PT a Waymo Autonomous Vehicle (“Waymo AV”) operating in Los Angeles, California was in a
  collision involving a shopping cart on E. 11th Street near Imperial Street.
  
  The Waymo AV was traveling northwestbound on E. 11th Street when a pedestrian standing in the roadway on the south side of E. 11th
  Street pushed a shopping cart towards the Waymo AV’s lane of travel. The shopping cart made contact with the left side of the Waymo AV.
  At the time of the impact, the Waymo AV’s Level 4 ADS was engaged in autonomous mode. The Waymo AV sustained damage.
