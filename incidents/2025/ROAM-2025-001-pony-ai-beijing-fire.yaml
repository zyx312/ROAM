description: |
  A Pony.ai autonomous test vehicle caught fire after veering off the road in
  Beijing's Daxing district. The vehicle was operating without passengers at the
  time of the incident. No injuries were reported. The fire was significant enough
  to require fire department response. The incident led to a temporary suspension
  of Pony.ai's robotaxi service in the affected district while an investigation
  was conducted. This was notable as one of the few vehicle fire incidents
  involving an L4 autonomous vehicle.
description_cn: |
  一辆小马智行（Pony.ai）自动驾驶测试车辆在北京大兴区偏离道路后起火。事发时车内无乘客。
  未造成人员伤亡。火势较大，需消防部门出动灭火。该事件导致小马智行在该区域的 Robotaxi
  服务被暂时叫停，待调查完成后恢复运营。该事件是为数不多的涉及 L4 自动驾驶车辆起火的
  案例之一。
