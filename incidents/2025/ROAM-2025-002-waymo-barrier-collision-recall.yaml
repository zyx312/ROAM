description: |
  Waymo issued a voluntary recall of 1,212 vehicles due to a software issue causing
  collisions with roadside barriers, gates, and chains. The vehicles failed to
  properly detect or respond to certain types of thin or low-contrast barriers
  such as parking lot gates, chains, and flexible bollards. Multiple low-speed
  collisions were reported across Waymo's operating territories. No injuries
  resulted from these incidents but vehicle and property damage occurred.
description_cn: |
  Waymo 因软件问题导致车辆与路侧护栏、道闸和链条发生碰撞，主动召回 1,212 辆车。车辆未能
  正确检测或响应某些类型的细长、低对比度障碍物，如停车场道闸、链条和柔性防撞柱。Waymo
  运营区域内报告了多起低速碰撞事故。事故未造成人员伤亡，但造成了车辆和财产损失。
