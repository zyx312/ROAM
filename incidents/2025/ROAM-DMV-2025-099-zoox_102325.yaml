description: |
  A Zoox vehicle (Vehicle 1) in autonomous mode was traveling in the left lane on eastbound on 14th Street past Dolores Street in
  San Francisco when it began to slow gradually for a nearly stopped passenger car (Vehicle 2) ahead in the same lane. The
  driver of Vehicle 2 then began reversing without using turn signals. The Zoox vehicle braked to a stop, and its operator
  disengaged autonomy, while vehicle 2 continued to reverse, steering left, seemingly attempting to pull into a parking spot in the
  curb lane adjacent to the stopped Zoox vehicle. During this maneuver, the right rear corner of Vehicle 2 swiped the left front
  corner of the Zoox vehicle. The Zoox vehicle sustained no damage, while Vehicle 2 incurred minor damage. No injuries were
  reported, and law enforcement was not notified.
