description: |
  On September 10th, 2022 at 12:57 PM PST a Waymo Autonomous Vehicle (“Waymo AV”) operating in San Francisco, CA was in a
  collision involving a pickup truck in a parking lot at 2121 Evans Avenue.
  
  The Waymo AV came to a stop in the parking lot while yielding to both pedestrians and an oncoming pickup truck. While the Waymo AV
  was stopped, the oncoming pickup truck passed the Waymo AV on the left hand side, making contact with the rear left sensor of the
  Waymo AV. The pickup truck then left the scene. At the time of the impact, the Waymo AV’s Level 4 ADS was stationary and engaged in
  autonomous mode, and a test driver was present (in the driver’s seating position). The Waymo AV sustained damage.
