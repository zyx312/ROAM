description: |
  While departing from a standstill in heavy traffic with L3 ADS engaged, the subject Mercedes-Benz vehicle was struck in the rear bumper
  by a large semi-truck. No injuries were reported. The contact from the truck resulted in two minor scratches and two indentations on the rear
  bumper of the subject Mercedes-Benz. The driver of the truck did not pull over after the collision and departed the scene. After a police
  report was initiated, the subject Mercedes-Benz drove away from the incident location. Further inspection of the vehicle revealed no
  additional damage beyond the cosmetic dents and surface scratches on the Mercedes-Benz.
