description: |
  On December 13, 2022 at 12:35 PM PST a Waymo Autonomous Vehicle (“Waymo AV”) operating in San Francisco, California was in a
  collision involving a passenger vehicle on 19th Avenue at Ulloa Street.
  
  The Waymo AV was stopped facing south on 19th Avenue for a red light in the right lane of the three-lane street while in autonomous
  mode. A passenger vehicle approached from behind and made contact with the rear of the Waymo AV. At the time of the impact, the
  Waymo AV’s Level 4 ADS was engaged in autonomous mode, and a test driver was present (in the driver’s seating position). The Waymo
  sustained damage.
