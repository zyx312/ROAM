description: |
  On May 27th, 2022 at 1:16AM PST a Waymo Autonomous Vehicle (“Waymo AV”) operating in San Francisco, California was in a
  collision involving a motorcycle on Bush Street at Stockton Street.
  
  While the Waymo AV was stopped at a red light on eastbound Bush in the rightmost lane, a motorcycle approached the Waymo AV from
  behind and the front of the motorcycle made contact with the rear of the Waymo AV. At the time of the impact, the Waymo AV’s Level 4
  ADS was engaged in autonomous mode, and a test driver was present (in the driver’s seating position). Both vehicles sustained minor
  damage.
