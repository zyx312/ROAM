description: |
  The Mercedes-Benz vehicle was traveling NB on Highway 280, near Bird Avenue, in lane one. Traffic ahead began slowing, and the
  operator attempted a right lane change into lane two. The Mercedes-Benz vehicle operator was unable to complete the lane change and
  instead applied the brakes. The Mercedes-Benz operator was unable to avoid contact with the Ford vehicle that was in front of it, and the
  Mercedes-Benz front bumper contacted the rear bumper of the Ford vehicle.
