description: |
  On September 15, 2022 at 9:42 AM PST a Waymo Autonomous Vehicle (“Waymo AV”) operating in San Francisco, California was in a
  collision involving a passenger car on California Street at 19th Avenue.
  
  The Waymo AV stopped at a stop sign facing east on California Street at 19th Avenue. A passenger car approaching from behind made
  contact with the rear of the Waymo AV. At the time of the impact, the Waymo AV’s Level 4 ADS was engaged in autonomous mode, and a
  test driver was present (in the driver’s seating position). The Waymo AV sustained damage.
