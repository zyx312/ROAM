description: |
  On February 14, 2022 at 3:02 PM PST a Waymo Autonomous Vehicle (“Waymo AV”) operating in San Francisco, California was in a
  collision involving a passenger vehicle on Kansas Street at 16th Street.
  
  The Waymo AV was stopped at a red light facing north on Kansas Street at the 16th Street intersection in autonomous mode. While the
  traffic light was still red, the vehicle immediately behind the Waymo AV began to accelerate and made contact with the rear bumper of the
  Waymo AV. At the time of the impact, the Waymo AV’s Level 4 ADS was engaged in autonomous mode, and a test driver was present (in
  the driver’s seating position). The Waymo AV sustained minor damage.
